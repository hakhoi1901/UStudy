<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003A78;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Nền bo góc mềm mại -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)"/>
  
  <!-- Hình ảnh mũ cử nhân (Graduation Cap) -->
  <g filter="url(#shadow)">
    <!-- Đỉnh mũ -->
    <path d="M256 128 L80 216 L256 304 L432 216 Z" fill="#FFFFFF"/>
    
    <!-- Phần thân dưới của mũ -->
    <path d="M136 260 L136 348 C136 412 256 432 256 432 C256 432 376 412 376 348 L376 260" fill="none" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Dây tua rua (Tassel) -->
    <path d="M432 216 L432 340" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round"/>
    <circle cx="432" cy="360" r="24" fill="#FFFFFF"/>
    
    <!-- Nút trên đỉnh mũ -->
    <ellipse cx="256" cy="216" rx="20" ry="12" fill="#003A78"/>
  </g>
</svg>
